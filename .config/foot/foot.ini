# -*- conf -*-
term=foot
shell=/usr/bin/nu

# Appearance
font=JetBrainsMono Nerd Font:size=6
pad=12x12 center
dpi-aware=true

# Performance & Features
initial-window-size-pixels=1200x700
resize-delay-ms=50
notify=notify-send -a ${app-id} -i ${app-id} ${title} ${body}
word-delimiters=,│`|:"'()[]{}<>
selection-target=clipboard

# Scrollback
[scrollback]
lines=10000
multiplier=3.0

# URL handling
[url]
launch=xdg-open ${url}
osc8-underline=url-mode

# Mouse
[mouse]
hide-when-typing=yes

# Colors
[colors]
alpha=0.95
foreground=a3aed2  # Light purple/grey from your scheme
background=1d2230  # Darkest blue from your scheme

# Normal/regular colors (color palette 0-7)
regular0=212736   # black (darker blue)
regular1=ff757f   # red
regular2=769ff0   # blue (from your scheme)
regular3=a3aed2   # light grey (from your scheme)
regular4=394260   # dark blue (from your scheme)
regular5=9d7cd8   # purple
regular6=7dcfff   # cyan
regular7=c0caf5   # white

# Bright colors (color palette 8-15)
bright0=394260    # bright black
bright1=ff9da4    # bright red
bright2=9ab9f5    # bright blue
bright3=c2caed    # bright grey
bright4=4a5785    # bright dark blue
bright5=bb99f0    # bright purple
bright6=99e2ff    # bright cyan
bright7=d5deff    # bright white

selection-foreground=1d2230
selection-background=a3aed2

[csd]
size=0

# Key Bindings - Professional Setup
[key-bindings]
# System clipboard - keep ONLY these
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

# Explicitly disable everything else to prevent conflicts
scrollback-up-page=none
scrollback-up-half-page=none
scrollback-up-line=none
scrollback-down-page=none
scrollback-down-half-page=none
scrollback-down-line=none
search-start=none
font-increase=none
font-decrease=none
font-reset=none
spawn-terminal=none
show-urls-launch=none
show-urls-copy=none
show-urls-persistent=none
prompt-prev=none
prompt-next=none
unicode-input=none
noop=none

[search-bindings]
# Disable search bindings - let editor handle search
find-prev=none
find-next=none
cursor-left=none
cursor-left-word=none
cursor-right=none
cursor-right-word=none
cursor-home=none
cursor-end=none
delete-prev=none
delete-prev-word=none
delete-next=none
delete-next-word=none
extend-char-left=none
extend-char-right=none
extend-word-left=none
extend-word-right=none
clipboard-paste=none
primary-paste=none
