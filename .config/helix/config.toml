theme = "custom"

[editor]
line-number = "relative"
mouse = false
bufferline = "multiple"
true-color = true
color-modes = true
cursorline = true
rulers = [80]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "▏"
skip-levels = 1

[editor.soft-wrap]
enable = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = ["diagnostics", "workspace-diagnostics"]
right = ["selections", "position", "file-encoding"]

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
";" = "command_mode"
"C-/" = "toggle_comments"
"C-s" = ":w"
"C-q" = ":q"

[keys.insert]
"C-c" = "normal_mode"

[editor.file-picker]
hidden = false
parents = true
ignore = true
git-ignore = true

[editor.whitespace]
render = "all"
characters = { space = "·", nbsp = "⍽", tab = "→", newline = "⏎", tabpad = "·" }
